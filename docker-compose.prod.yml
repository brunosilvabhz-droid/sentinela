services:
  proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file: ./.env.server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
        VITE_API_FALLBACK_URL: ""
        VITE_SENTINELA_LOGIN_URL: /app
    restart: unless-stopped
    depends_on:
      - api

  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./.env.server
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    volumes:
      - sentinela_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./.env.server
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    volumes:
      - sentinela_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: ./backend
    restart: unless-stopped
    env_file: ./.env.server
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    volumes:
      - sentinela_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ./.env.server
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinela}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sentinela}
    volumes:
      - sentinela_pg:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinela} -d ${POSTGRES_DB:-sentinela}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - sentinela_redis:/data

volumes:
  sentinela_pg:
  sentinela_redis:
  sentinela_uploads:
  caddy_data:
  caddy_config:

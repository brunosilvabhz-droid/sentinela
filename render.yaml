services:
  - type: web
    name: sentinela-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sentinela-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sentinela-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://sentinela-web.onrender.com
      - key: FRONTEND_PUBLIC_URL
        value: https://sentinela-web.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

  - type: worker
    name: sentinela-worker
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sentinela-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sentinela-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: sentinela-api
          envVarKey: JWT_SECRET_KEY
      - key: FRONTEND_PUBLIC_URL
        value: https://sentinela-web.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

  - type: worker
    name: sentinela-beat
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sentinela-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sentinela-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: sentinela-api
          envVarKey: JWT_SECRET_KEY

  - type: web
    name: sentinela-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://sentinela-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: sentinela-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: sentinela-db
    plan: free
    databaseName: sentinela
    user: sentinela
    postgresMajorVersion: "16"

services:
  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./backend/.env.example
    volumes:
      - ./backend/app:/app/app
      - sentinela_uploads:/app/storage/uploads
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file: ./backend/.env.example
    volumes:
      - ./backend/app:/app/app
      - sentinela_uploads:/app/storage/uploads
    depends_on:
      - postgres
      - redis

  beat:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    env_file: ./backend/.env.example
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sentinela
      POSTGRES_PASSWORD: sentinela
      POSTGRES_DB: sentinela
    ports:
      - "5432:5432"
    volumes:
      - sentinela_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  sentinela_pg:
  sentinela_uploads:
